    start: "2024-06-01"
    end: "2024-08-01"
    summary: " Working with [Léonard Monsaingeon](https://sites.google.com/view/lmonsaingeon/home) on regularized optimal transport theory.


      Implementation of Sinkhorn algorithms, Wasserstein distances and barycenters in Python. Study of optimal transport theory, relaxation, and entropic regularisation."
    button:
