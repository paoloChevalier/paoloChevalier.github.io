    summary: "Working with [Pascal Yiou](https://scholar.google.com/citations?user=g2hesvMAAAAJ&hl=fr&oi=ao) on climate extremes using AI forecasting models."
  - role: "Research Intern, Transfer learning for the estimation of committor functions"
    org: "Laboratory of Climate and Environmental Sciences (LSCE)"
    start: "2025-06-01"
    end: "2025-09-01"
    summary: " Working with [Pascal Yiou](https://scholar.google.com/citations?user=g2hesvMAAAAJ&hl=fr&oi=ao) on transfer learning for the estimation of committor functions in climate models.

      - Applied transfer learning to improve heatwave forecasts, extending prediction lead time from 3 to 5 days using circulation analogs.

      - Trained U-Net deep learning model in IPSL-CM6A-LR and ERA5 to predict temperature fields from circulation fields, achieving correlations above 0.95 for 1-day forecasts.

      - Wrote optimized code for calculating atmospheric analogs using matrix operations, significantly reducing computation time."
    button:
